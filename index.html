<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xoleric Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        canvas { display: block; }

        /* Cinematic Vignette Effect */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.8) 150%);
            pointer-events: none;
            z-index: 5;
        }

        /* Modern Glassmorphism Tooltip */
        #info {
            position: absolute;
            background: rgba(10, 10, 10, 0.4);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            color: #fff;
            padding: 10px 18px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.15);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s cubic-bezier(0.23, 1, 0.32, 1), transform 0.1s ease-out;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            font-weight: 500;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }

        #info i { color: #00ffaa; font-size: 0.9rem; }

        /* Loader */
        #loader {
            position: fixed;
            inset: 0;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
            transition: opacity 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .pulse { 
            animation: pulse 2s infinite; 
            font-size: 0.9rem; 
            letter-spacing: 4px; 
            font-weight: 300;
            text-transform: uppercase;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

<div id="loader"><div class="pulse">Xoleric Engine Yuklanmoqda...</div></div>
<div id="info"></div>

<audio id="hoverSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
<audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let camera, scene, renderer, mesh, material, imgData, objects;
    let lon = 0, lat = 0, phi = 0, theta = 0;
    let targetLon = 0, targetLat = 0;
    let targetFov = 75; 
    let lastHoveredId = null;
    let isUserInteracting = false;

    const mouse = new THREE.Vector2();
    const raycaster = new THREE.Raycaster();
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const info = document.getElementById('info');
    const hoverSound = document.getElementById('hoverSound');
    const clickSound = document.getElementById('clickSound');
    hoverSound.volume = 0.15;

    const config = {
        texture: "https://i.imgur.com/jevL9av.jpg",
        stencil: "https://i.imgur.com/NUKbrbl.png",
        sensitivity: 0.18, // Harakat tezligi (oshirildi)
        damping: 0.07,      // Silliqlik (kamaytirilsa yanada "muzdek" sirpanadi)
        autoRotateSpeed: 0.04,
        objects: {
            "255,0,0": "Socket 1",
            "245,0,0": "Window 1",
            "235,0,0": "White box",
            "225,0,0": "Box",
            "215,0,0": "Drawer",
            "205,0,0": "Socket 2",
            "195,0,0": "Fireplace",
            "185,0,0": "Window 2",
            "175,0,0": "The Moose Area",
            "165,0,0": "Main Table"
        }
    };

    init();

    function init() {
        objects = config.objects;

        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1100);
        
        const geometry = new THREE.SphereGeometry(500, 70, 40);
        geometry.scale(-1, 1, 1);

        material = createMaterial(config.texture, config.stencil);
        mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Event Listeners
        window.addEventListener('resize', onWindowResize);
        document.addEventListener('mousedown', onPointerStart);
        document.addEventListener('mousemove', onPointerMove);
        document.addEventListener('mouseup', () => isUserInteracting = false);
        document.addEventListener('wheel', onDocumentMouseWheel, { passive: false });
        
        // Mobile Support
        document.addEventListener('touchstart', onPointerStart, { passive: false });
        document.addEventListener('touchmove', onPointerMove, { passive: false });
        document.addEventListener('touchend', () => isUserInteracting = false);

        animate();
        
        // Hide Loader
        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').remove(), 1200);
        }, 1800);
    }

    function createMaterial(img, stencil) {
        const loader = new THREE.TextureLoader();
        const stencilImage = new Image();
        stencilImage.crossOrigin = "anonymous";
        stencilImage.src = stencil;

        stencilImage.onload = function() {
            canvas.width = stencilImage.width;
            canvas.height = stencilImage.height;
            ctx.drawImage(stencilImage, 0, 0);
            imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        };

        return new THREE.ShaderMaterial({
            uniforms: {
                uMouse: { value: new THREE.Vector2(0,0) },
                uTexture: { value: loader.load(img) },
                uStencil: { value: loader.load(stencil) },
                uTime: { value: 0 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }`,
            fragmentShader: `
                precision highp float;
                varying vec2 vUv;
                uniform vec2 uMouse;
                uniform sampler2D uTexture;
                uniform sampler2D uStencil;
                uniform float uTime;

                void main() {
                    vec4 color = texture2D(uTexture, vUv);
                    vec4 stencil = texture2D(uStencil, vUv);
                    vec4 mouseStencil = texture2D(uStencil, uMouse);

                    // Pulsating Highlight Effect
                    if (length(mouseStencil.rgb - stencil.rgb) < 0.01 && stencil.r > 0.0) {
                        float pulse = (sin(uTime * 4.5) * 0.1) + 0.15;
                        color.rgb += vec3(0.0, pulse, pulse * 0.5); 
                    }
                    gl_FragColor = color;
                }`
        });
    }

    let onPointerDownPointerX = 0, onPointerDownPointerY = 0, onPointerDownLon = 0, onPointerDownLat = 0;

    function onPointerStart(event) {
        isUserInteracting = true;
        const clientX = event.clientX || (event.touches ? event.touches[0].clientX : 0);
        const clientY = event.clientY || (event.touches ? event.touches[0].clientY : 0);
        
        onPointerDownPointerX = clientX;
        onPointerDownPointerY = clientY;
        onPointerDownLon = targetLon;
        onPointerDownLat = targetLat;

        if(info.style.opacity == "1") {
            clickSound.currentTime = 0;
            clickSound.play();
        }
    }

    function onPointerMove(event) {
        const clientX = event.clientX || (event.touches ? event.touches[0].clientX : 0);
        const clientY = event.clientY || (event.touches ? event.touches[0].clientY : 0);

        if (isUserInteracting) {
            targetLon = (onPointerDownPointerX - clientX) * config.sensitivity + onPointerDownLon;
            targetLat = (clientY - onPointerDownPointerY) * config.sensitivity + onPointerDownLat;
        }

        // Interaction Logic
        mouse.x = (clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(clientY / window.innerHeight) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(mesh);

        if (intersects.length > 0 && imgData) {
            const uv = intersects[0].uv;
            material.uniforms.uMouse.value = uv;

            const px = Math.floor(uv.x * canvas.width);
            const py = Math.floor((1 - uv.y) * canvas.height);
            const off = (py * canvas.width + px) * 4;

            const r = imgData.data[off], g = imgData.data[off+1], b = imgData.data[off+2];
            const objectId = `${r},${g},${b}`;
            const objectName = objects[objectId];

            if (objectName) {
                if (lastHoveredId !== objectId) {
                    hoverSound.currentTime = 0;
                    hoverSound.play();
                    lastHoveredId = objectId;
                }
                document.body.style.cursor = 'pointer';
                info.innerHTML = `<i class="fa-solid fa-expand"></i> ${objectName}`;
                info.style.opacity = "1";
                info.style.transform = `translate(${clientX + 20}px, ${clientY - 20}px)`;
            } else {
                document.body.style.cursor = 'default';
                info.style.opacity = "0";
                lastHoveredId = null;
            }
        }
    }

    function onDocumentMouseWheel(event) {
        event.preventDefault();
        targetFov = Math.max(25, Math.min(85, targetFov + event.deltaY * 0.06));
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);

        // Auto Rotation when idle
        if (!isUserInteracting) {
            targetLon += config.autoRotateSpeed;
        }

        // Smooth Interpolation (Damping)
        lon += (targetLon - lon) * config.damping;
        lat += (targetLat - lat) * config.damping;
        lat = Math.max(-85, Math.min(85, lat));

        // Smooth Zoom
        camera.fov += (targetFov - camera.fov) * config.damping;
        camera.updateProjectionMatrix();

        phi = THREE.MathUtils.degToRad(90 - lat);
        theta = THREE.MathUtils.degToRad(lon);

        camera.target = new THREE.Vector3(
            500 * Math.sin(phi) * Math.cos(theta),
            500 * Math.cos(phi),
            500 * Math.sin(phi) * Math.sin(theta)
        );

        camera.lookAt(camera.target);
        material.uniforms.uTime.value += 0.015;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
